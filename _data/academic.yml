bio:
  summary_zh: "这里已完成学术博客的结构化改造。由于当前环境无法稳定提取 `main.pdf` 文本，这一版先把简介、教育经历、论文、项目与视频展示模块全部接通；你只需要把简历中的真实信息填入这个数据文件，就能同步更新首页、About、Research、Publications 与 Videos 页面。"
  summary_en: "This site has been restructured into a bilingual academic blog. Because the current environment could not reliably extract text from `main.pdf`, this first pass wires up the profile, education, publications, projects, and video sections so that you can fill in the real resume details in one place and update the whole site."

