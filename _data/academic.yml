projects:
  - name_zh: "基于视觉-语言大模型的机械臂智能抓取研究"
    name_en: "Vision-Language-Model-Based Intelligent Robotic Grasping"
    description_zh: "设计并实现基于 Qwen3-VL、SAM、GraspNet、ROS2 与 MoveIt2 的自然语言驱动机械臂抓取系统，完成从指令理解、目标识别与分割、抓取位姿生成到机械臂执行控制的完整闭环。"
    description_en: "Built a language-driven robotic grasping system based on Qwen3-VL, SAM, GraspNet, ROS2, and MoveIt2, covering instruction understanding, object recognition and segmentation, grasp pose generation, and robotic execution in a full closed loop."
    period_zh: "2025.06 - 2026.04"
    period_en: "Jun 2025 - Apr 2026"
    related_publication: "Franka Panda, ROS2, MoveIt2, impedance control"
    featured: true
  - name_zh: "RoboMaster 全国大学生机器人大赛"
    name_en: "RoboMaster National Collegiate Robot Competition"
    description_zh: "担任空中机器人组负责人，统筹机械、电控与视觉模块协同开发，完成无人机平台、飞控系统、激光雷达定位建图与三轴云台系统设计，实现队伍成绩由全国三等奖提升至全国一等奖。"
    description_en: "Led the aerial robotics team and coordinated mechanical, electrical, and vision modules. Delivered the UAV platform, flight control stack, LiDAR-based localization and mapping, and a three-axis gimbal system, helping the team improve from national third prize to first prize."
    period_zh: "2023.08 - 2025.08"
    period_en: "Aug 2023 - Aug 2025"
    related_publication: "ROS2, FAST-LIO, LiDAR + IMU, PID control"
    featured: true
  - name_zh: "中国大学生工程实践与创新能力大赛"
    name_en: "China Engineering Practice and Innovation Competition"
    description_zh: "设计并实现基于 SCARA 机械臂与四麦轮底盘小车的自动化集成系统，独立编写覆盖 20+ 项任务、100+ 状态的状态机控制逻辑，完成视觉识别、定位与抓取联调。"
    description_en: "Designed an integrated automation system based on a SCARA arm and a four-mecanum-wheel mobile platform, and independently implemented a full state machine covering 20+ tasks and 100+ states for coordinated perception and manipulation."
    period_zh: "2025.01 - 2025.08"
    period_en: "Jan 2025 - Aug 2025"
    related_publication: "State machine design, mobile manipulation, system integration"
    featured: true
  - name_zh: "全国大学生电子设计竞赛无人机赛题"
    name_en: "National Undergraduate Electronic Design Contest - UAV Track"
    description_zh: "独立完成四旋翼无人机的方案设计、结构搭建、硬件集成、控制程序开发与整机调试，完成目标搜索、识别、跟踪与路径规划等核心功能，并负责多层 PID 参数整定。"
    description_en: "Independently completed the full workflow for a quadrotor UAV, including system design, structural build, hardware integration, control software, and end-to-end tuning, with target search, recognition, tracking, path planning, and multi-loop PID calibration."
    period_zh: "2024.05 - 2025.08"
    period_en: "May 2024 - Aug 2025"
    related_publication: "Drone system development, vision targeting, control tuning"
    featured: true

summary:
  zh:
    - "具备真实机器人平台开发经验，能够围绕机械臂任务完成感知、规划、控制与执行闭环系统设计。"
    - "熟悉 Ubuntu、C++、Python、ROS2、MoveIt2 与机器人学相关模块开发，具备较强的系统集成与工程落地能力。"
    - "具备复杂任务拆解与多模块联调能力，能够面向实际机器人任务完成问题定位、流程优化与系统迭代。"
    - "持续关注机器人操作、具身智能与智能控制方向，具备扎实工程基础与持续深入发展的潜力。"
  en:
    - "Experienced with real robotic platforms and capable of building full closed-loop systems for perception, planning, control, and execution."
    - "Familiar with Ubuntu, C++, Python, ROS2, MoveIt2, and core robotics modules, with strong system integration and engineering delivery skills."
    - "Able to break down complex tasks, coordinate multiple modules, and handle debugging and workflow optimization in practical robotics projects."
    - "Continuously focused on robotic manipulation, embodied intelligence, and intelligent control, with a solid engineering foundation for further growth."

